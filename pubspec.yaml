name: web_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  backend_client:
    path: ../packages/backend_client
  go_router: ^14.8.1
  intl: ^0.20.2
  provider: ^6.1.5
  fl_chart: ^1.1.1
  barcode_widget: ^2.0.4
  file_picker: ^10.3.3
  http: ^1.6.0
  http_parser: ^4.0.0
  crypto: ^3.0.3
  pdf: ^3.10.4
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/nstu_logo.jpg
    - assets/images/prescription_download_heading.png

  fonts:
    - family: Kalpurush
      fonts:
        - asset: assets/fonts/Kalpurush.ttf
